spring:
  application:
    # 重新定义一个应用程序名称, 以防止和 client 端服务注册冲突 (但由于 eureka.client.register-with-eureka=false), 所以实际无影响
    name: study-springcloud-eureka-test

logging:
  level:
    com:
      netflix: DEBUG

feign:
  client:
    config:
      default:
        # 测试时使用日志级别
        logger-level: full

eureka:
  client:
    # 是否注册本机节点, 由于是测试服务发现, 无需注册本机节点
    register-with-eureka: false

application:
  server:
    # 要访问的服务名称, OpenFeign 通过此名称进行服务发现
    # 参见 @FeignClient 注解
    name: study-springcloud-eureka-client
