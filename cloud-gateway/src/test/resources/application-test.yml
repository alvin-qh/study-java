spring:
  application:
    # 重新定义一个应用程序名称, 以防止和 client 端服务注册冲突 (但由于 eureka.client.register-with-eureka=false), 所以实际无影响
    name: study-springcloud-gateway-test

  cloud:
    # 配置 Nacos 服务发现
    nacos:
      server-addr: http://localhost:8848
      username: nacos
      password: nacos
      discovery:
        group: STUDY_GATEWAY
