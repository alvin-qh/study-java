spring:
  main:
    banner-mode: off

  # 设置默认使用的配置名
  profiles:
    active: gateway

logging:
  level:
    com:
      alibaba: WARN

# 分段配置, 不同情况下使用不同的配置段

---
# 当工程以 Gateway 模式运行时的配置段
spring:
  config:
    activate:
      # 该配置段对应的名称
      on-profile: gateway

  main:
    # Spring Cloud Gateway 无法和 Servlet 模式的 Spring Boot MVC 框架共存, 需要将 Web 模式设置为 reactive
    # 正常情况下, Spring Cloud Gateway 项目中不应该添加 org.springframework.boot:spring-boot-starter-web 依赖
    web-application-type: reactive
  application:
    # Gateway 在服务发现中注册的名称
    name: study-springcloud-gateway

  cloud:
    nacos:
      # 配置 Nacos 服务发现
      server-addr: http://localhost:8848
      username: nacos
      password: nacos
      discovery:
        enabled: true
        group: STUDY_GATEWAY

    # 配置 Spring Cloud Gateway
    gateway:
      # 定义转发规则
      routes:
        # 规则 1, 通过 PATH 断言判断是否需要转发
        - id: path_router
          # 要转发的目标地址, 目标地址可以为 http://, https:// 和 lb:// 等
          # lb 表示通过服务发现进行转发, 后面跟所注册的服务名
          uri: lb://study-springcloud-gateway-backend
          # 定义转发断言
          predicates:
            # Path 断言用于将访问指定路径的请求进行转发, 参数为要判断的路径
            - Path=/backend/**
          # 定义转发过滤器
          filters:
            # StripPrefix 表示转发前对 URL 进行重写, 去掉指定数量的层数
            # 本例中去掉第一层路径, 即 /backend/a/b 的访问会重写为 /a/b
            - StripPrefix=1

        # 规则 2, 通过 JWT 断言判断是否需要转发
        - id: jwt_router
          uri: lb://study-springcloud-gateway-backend
          predicates:
            - Path=/auth/**
            # JWT 断言为自定义断言, 参见 alvin.study.core.gateway.predicate.JWTRoutePredicateFactory 定义
            # 指定的配置参数用逗号隔开依次传递
            # 该断言会将所有具备 Authorization 请求头, 且内容为 JWT 凭证, 且凭证的 audience 字段为 third-part 的请求进行转发
            - JWT=Authorization,HMAC256,TS#1}'v(xo{5QhU]*~>3CHEBk)|MLqRe,third-part
          # filters:
          #   - RewritePath=/(?<segment>.*),/auth/user/$\{segment}

# 指定 Gateway 服务绑定的端口号
server:
  port: 8080

---
# 当工程以 WEB 应用模式运行时的配置段
# 如果要在单机启动多个实例组成集群, 则需要传递 --server.port=xxxx 参数
spring:
  config:
    activate:
      # 该配置段对应的名称
      on-profile: web-server

  application:
    # WEB 应用在服务发现中注册的名称
    name: study-springcloud-gateway-backend

  cloud:
    # 配置 Nacos 服务发现
    nacos:
      server-addr: http://localhost:8848
      username: nacos
      password: nacos
      discovery:
        enabled: true
        group: STUDY_GATEWAY

# 指定 WEB 应用服务绑定的默认端口号
server:
  port: 8081
