plugins {
  id "com.waftex.assertj-generator" version "${VER_GRADLE_ASSERTJ_GENERATOR}"
}

assertjGenerator {
  outputDir = "src/test/assertj"
  entryPointTypes = ["STANDARD", "BDD", "SOFT"]
  entryPointPackage = "alvin.study.testing.assertj.assertion"
  classOrPackageNames = ["alvin.study.testing.testcase.model.User"]
}

sourceSets {
  test {
    java {
      srcDirs += ["src/test/assertj"]
    }
  }
}

dependencies {
  testImplementation project(":testing:testcase"),
    "javax.annotation:javax.annotation-api:1.3.2"
}
