version: "3.9"
services:
  # 启动 3 个 nacos 实例
  nacos1:
    image: nacos/nacos-server:v2.1.2
    hostname: nacos1
    container_name: nacos1
    env_file:
      # 指定 nacos 启动环境变量
      - ./env/nacos.env
    volumes:
      - ./nacos_logs:/home/nacos/logs
    privileged: true
    restart: always
    depends_on:
      percona:
        condition: service_healthy
    networks:
      - nacos_network
    healthcheck:
      # 健康检查
      test: [ "CMD-SHELL", "curl -f localhost:8848/nacos" ]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 40s
  nacos2:
    image: nacos/nacos-server:v2.1.2
    hostname: nacos2
    container_name: nacos2
    env_file:
      - ./env/nacos.env
    volumes:
      - ./nacos_logs:/home/nacos/logs
    privileged: true
    restart: always
    depends_on:
      percona:
        condition: service_healthy
    networks:
      - nacos_network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f localhost:8848/nacos" ]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 40s
  nacos3:
    image: nacos/nacos-server:v2.1.2
    hostname: nacos3
    container_name: nacos3
    env_file:
      - ./env/nacos.env
    volumes:
      - ./nacos_logs:/home/nacos/logs
    privileged: true
    restart: always
    depends_on:
      percona:
        condition: service_healthy
    networks:
      - nacos_network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f localhost:8848/nacos" ]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 40s
  # 启动 nginx 服务进行负载均衡
  nginx:
    image: nginx
    hostname: nginx
    container_name: nginx
    volumes:
      - ./conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx_logs:/var/log/nginx
    ulimits:
      nproc: 65535
      nofile:
        soft: 65536
        hard: 65536
      memlock:
        soft: -1
        hard: -1
    restart: always
    # 暴露 nacos 所有对外端口
    ports:
      - 8848:8848
      - 9848:9848
      - 9849:9849
    networks:
      - nacos_network
    depends_on:
      nacos1:
        condition: service_healthy
      nacos2:
        condition: service_healthy
      nacos3:
        condition: service_healthy
  # nacos 配置存储数据库
  percona:
    image: percona/percona-server
    hostname: percona
    container_name: percona
    restart: always
    privileged: true
    ulimits:
      nproc: 65535
      nofile:
        soft: 65536
        hard: 65536
      memlock:
        soft: -1
        hard: -1
    deploy:
      resources:
        limits:
          # cpus: '1'
          memory: 1G
        # reservations:
          # memory: 100M
    env_file:
      - ./env/percona.env
    volumes:
      - ./conf:/etc/my.cnf.d
      # 设置初始化 sql 路径
      - ./sql:/docker-entrypoint-initdb.d
      - ./percona_logs:/var/log/mysql
      - percona_data:/var/lib/mysql
    networks:
      - nacos_network
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost" ]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 40s
networks:
  nacos_network:
volumes:
  percona_data:
